{{- if .Values.route.patchAnnotations.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "rproxy.fullname" . }}-patch-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rproxy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    spec:
      serviceAccountName: pipeline
      restartPolicy: OnFailure
      containers:
        - name: patch-route
          image: {{ .Values.route.patchAnnotations.image }}
          command:
            - kubectl
            - patch
            - route
            - {{ .Values.route.patchAnnotations.routeName | default (include "rproxy.fullname" .) }}
            - --type=merge
            - --patch
            - |
              {"metadata":{"annotations":{"haproxy.router.openshift.io/rate-limit-connections":"true","haproxy.router.openshift.io/rate-limit-connections.concurrent-tcp":"100","haproxy.router.openshift.io/rate-limit-connections.rate-tcp":"50"}}}
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
{{- end }}
