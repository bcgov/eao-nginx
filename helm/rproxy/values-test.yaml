# Test environment values for rproxy
replicaCount: 2

image:
  tag: "test"

nginx:
  epic:
    serverName: "epic-6cdc9e-test.apps.silver.devops.gov.bc.ca test.projects.eao.gov.bc.ca"
    proxy:
      root: "http://eagle-public:8080"
      api: "http://eagle-api:3000"
      admin: "http://eagle-admin:8080"
      public: "http://eagle-public:8080"
      eguide: "http://eagle-api:3000"
      analytics: "http://penguin-analytics-api:3000"
      certbot: "http://certbot:8080"
      typesense: "http://typesense-typesense:8108"

httpBasic:
  enabled: true
  directive: "auth_basic \"Restricted Content\"; auth_basic_user_file /tmp/.htpasswd;"
  # Credentials injected via GitHub secrets - do NOT hardcode
  username: ""
  password: ""
  
  eguide:
    enabled: false
    directive: ""
    username: ""
    password: ""
  
  public:
    enabled: true
    directive: "auth_basic \"Restricted Content\"; auth_basic_user_file /tmp/.htpasswd2;"
    username: ""
    password: ""

# Test-specific server block configuration
nginxTest:
  serverName: "test.projects.eao.gov.bc.ca"
  proxy:
    root: "http://eagle-public:8080"
    api: "http://eagle-api:3000"
    admin: "http://eagle-admin:8080"
    public: "http://eagle-public:8080"
    analytics: "http://penguin-analytics-api:3000"

route:
  enabled: false  # Route already exists, managed separately
  host: eagle-test.apps.silver.devops.gov.bc.ca

resources:
  limits:
    cpu: 50m
    memory: 50Mi
  requests:
    cpu: 30m
    memory: 25Mi

# Application configuration served at /config.json
config:
  environment: "test"
  bannerColour: "orange"
  logLevel: 0
  apiLocation: "https://eagle-test.apps.silver.devops.gov.bc.ca"
  apiPath: "/api"
  adminPath: "/admin/"
  keycloak:
    clientId: "eagle-api-console"
    url: "https://test.loginproxy.gov.bc.ca/auth"
    realm: "eao-epic"
    enabled: true
  analytics:
    apiUrl: "/analytics"
    debug: true
    enhancedTracking: true
    trafficTracking: true
  survey:
    url: null
    showBanner: false
  typesense:
    enabled: true
    searchHost: "/search-api"
    searchKey: ""  # Injected from TYPESENSE_SEARCH_KEY secret at deploy time
